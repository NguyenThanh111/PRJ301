<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Network Manager</title>
</head>
<body style="margin:0; padding:0; background:#04060d; font-family:'Segoe UI',Arial,sans-serif;">
    <table role="presentation" style="width:100%;border-collapse:collapse;">
        <tr>
            <td style="padding:40px 20px;text-align:center;">
                <table role="presentation" style="max-width:560px;margin:0 auto;background:rgba(14,20,36,0.95);border-radius:16px;border:1px solid rgba(146,167,223,0.2);overflow:hidden;">
                    <tr>
                        <td style="padding:36px 32px 24px;text-align:center;border-bottom:1px solid rgba(146,167,223,0.1);">
                            <table role="presentation" style="width:60px;height:60px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(16,185,129,0.1));border:1px solid rgba(16,185,129,0.3);">
                                <tr><td style="text-align:center;font-size:28px;line-height:60px;">✅</td></tr>
                            </table>
                            <h1 style="margin:0;color:#a7f3d0;font-size:24px;font-weight:800;letter-spacing:-0.02em;">Welcome Aboard!</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            <p style="margin:0 0 16px;color:#d7def8;font-size:15px;line-height:1.6;">Hi <strong style="color:#f3f6ff;">{{USERNAME}}</strong>,</p>
                            <p style="margin:0 0 12px;color:#a2b0d4;font-size:14px;line-height:1.6;">
                                Your email has been verified successfully. You now have full access to the <strong style="color:#d7def8;">Network Manager</strong> platform.
                            </p>
                            <table role="presentation" style="margin:24px 0;padding:16px 20px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(146,167,223,0.12);width:100%;">
                                <tr>
                                    <td style="padding:6px 0;font-size:13px;color:#d5dcf6;">
                                        <span style="color:#10b981;">✓</span> Real-time network monitoring
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding:6px 0;font-size:13px;color:#d5dcf6;">
                                        <span style="color:#10b981;">✓</span> Access point analytics
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding:6px 0;font-size:13px;color:#d5dcf6;">
                                        <span style="color:#10b981;">✓</span> Alert and maintenance workflows
                                    </td>
                                </tr>
                            </table>
                            <table role="presentation" style="margin:24px auto;">
                                <tr>
                                    <td style="background:linear-gradient(90deg,#8b5cf6,#d946ef);border-radius:10px;box-shadow:0 10px 22px rgba(139,92,246,0.35);">
                                        <a href="{{DASHBOARD_LINK}}" style="display:inline-block;padding:14px 36px;color:#fff;font-size:15px;font-weight:700;text-decoration:none;border-radius:10px;letter-spacing:0.01em;">Go to Dashboard</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 32px;text-align:center;border-top:1px solid rgba(146,167,223,0.08);">
                            <p style="margin:0;color:#5a6888;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;">University Network Management System</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
